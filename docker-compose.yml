version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: asset-management-db
    environment:
      POSTGRES_USER: asset_user
      POSTGRES_PASSWORD: asset_password
      POSTGRES_DB: asset_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset_user -d asset_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asset-network

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asset-management-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://asset_user:asset_password@postgres:5432/asset_management
      API_KEY: my_super_secret_api_key_123
      DEBUG: "false"
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - asset-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  asset-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
